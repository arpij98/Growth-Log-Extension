<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Growth Log</title>
<style>
  :root {
    --ink: #1a1814; --ink-2: #4a453e; --ink-3: #8a8178;
    --paper: #f7f4ef; --paper-2: #eeebe4; --paper-3: #e4e0d8;
    --accent: #c17f3a; --accent-soft: #f0e4d0;
    --win: #3a7a5c; --win-soft: #d4ede2; --r: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 360px; min-height: 560px; background: var(--paper); color: var(--ink); font-family: Georgia, serif; font-size: 13px; line-height: 1.6; overflow-x: hidden; }
  .screen { display: none; flex-direction: column; min-height: 560px; }
  .screen.active { display: flex; }
  .nav { display: flex; border-bottom: 1px solid var(--paper-3); background: var(--paper); }
  .nav-btn { flex: 1; padding: 10px 4px 8px; border: none; background: transparent; cursor: pointer; font-family: Arial, sans-serif; font-size: 10px; color: var(--ink-3); display: flex; flex-direction: column; align-items: center; gap: 3px; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .nav-btn svg { width: 16px; height: 16px; }
  .nav-btn:hover { color: var(--ink); }
  .nav-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
  .header { padding: 16px 20px 12px; border-bottom: 1px solid var(--paper-3); display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .logo-mark { width: 22px; height: 22px; background: var(--ink); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .app-name { font-size: 14px; font-weight: bold; color: var(--ink); font-family: Georgia, serif; }
  .header-date { font-size: 11px; color: var(--ink-3); font-family: Arial, sans-serif; }
  .icon-btn { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--ink-3); }
  .icon-btn:hover { background: var(--paper-2); color: var(--ink); }
  .greeting { padding: 16px 20px 2px; font-size: 17px; line-height: 1.4; color: var(--ink); }
  .greeting em { font-style: italic; color: var(--ink-2); }
  .daily-prompt { padding: 3px 20px 12px; font-size: 12px; color: var(--ink-3); font-style: italic; }
  .categories { padding: 0 20px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .cat-pill { padding: 4px 11px; border-radius: 20px; font-size: 11.5px; cursor: pointer; border: 1px solid var(--paper-3); background: var(--paper); color: var(--ink-2); font-family: Arial, sans-serif; display: flex; align-items: center; gap: 5px; }
  .cat-pill:hover { border-color: var(--ink-3); color: var(--ink); }
  .cat-pill.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .composer { margin: 0 20px 12px; background: var(--paper-2); border-radius: var(--r); border: 1px solid var(--paper-3); overflow: hidden; }
  .composer:focus-within { border-color: var(--ink-3); }
  .composer textarea { width: 100%; min-height: 68px; padding: 11px 13px 8px; background: transparent; border: none; resize: none; font-family: Arial, sans-serif; font-size: 13px; color: var(--ink); line-height: 1.5; outline: none; }
  .composer textarea::placeholder { color: var(--ink-3); }
  .composer-footer { padding: 5px 8px 7px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .type-toggle { display: flex; gap: 4px; }
  .type-btn { padding: 3px 10px; border-radius: 20px; font-size: 11px; border: 1px solid transparent; background: transparent; color: var(--ink-3); cursor: pointer; font-family: Arial, sans-serif; }
  .type-btn.win.active { background: var(--win-soft); color: var(--win); border-color: #b8dfd0; }
  .type-btn.ref.active { background: var(--accent-soft); color: var(--accent); border-color: #ddc9a8; }
  .save-btn { padding: 5px 14px; background: var(--ink); color: var(--paper); border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; font-family: Arial, sans-serif; }
  .save-btn:hover { opacity: 0.8; }
  .section-header { padding: 0 20px 7px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-3); display: flex; align-items: center; justify-content: space-between; font-family: Arial, sans-serif; }
  .see-all-btn { font-size: 10px; text-transform: none; letter-spacing: 0; color: var(--ink-3); background: none; border: none; cursor: pointer; font-family: Arial, sans-serif; padding: 0; }
  .see-all-btn:hover { color: var(--ink); }
  .entries-list { padding: 0 20px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; max-height: 170px; }
  .entry-item { padding: 9px 11px; background: var(--paper-2); border-radius: 8px; border: 1px solid transparent; cursor: pointer; }
  .entry-item:hover { border-color: var(--paper-3); }
  .entry-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .type-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .type-win .type-dot { background: var(--win); }
  .type-ref .type-dot { background: var(--accent); }
  .entry-cat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; font-family: Arial, sans-serif; }
  .entry-date-lbl { font-size: 10px; color: var(--ink-3); margin-left: auto; font-family: Arial, sans-serif; }
  .entry-text { font-size: 12.5px; color: var(--ink); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-family: Arial, sans-serif; }
  .empty-state { padding: 16px 20px; text-align: center; color: var(--ink-3); font-size: 12px; font-style: italic; line-height: 1.6; }
  .stats-strip { padding: 10px 20px 12px; display: flex; gap: 10px; border-top: 1px solid var(--paper-3); margin-top: auto; }
  .stat-cell { flex: 1; text-align: center; }
  .stat-num { font-size: 17px; font-weight: bold; color: var(--ink); font-family: Georgia, serif; }
  .stat-lbl { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.07em; font-family: Arial, sans-serif; }
  .stat-div { width: 1px; background: var(--paper-3); margin: 4px 0; }
  .subheader { padding: 14px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--paper-3); }
  .back-btn { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink-3); border-radius: 6px; }
  .back-btn:hover { background: var(--paper-2); color: var(--ink); }
  .screen-title { font-size: 15px; font-weight: bold; color: var(--ink); font-family: Georgia, serif; }
  .filter-row { padding: 10px 20px; display: flex; gap: 6px; border-bottom: 1px solid var(--paper-3); flex-wrap: wrap; }
  .filter-btn { padding: 3px 10px; border-radius: 20px; font-size: 11px; border: 1px solid var(--paper-3); background: transparent; color: var(--ink-3); cursor: pointer; font-family: Arial, sans-serif; }
  .filter-btn:hover { color: var(--ink); border-color: var(--ink-3); }
  .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .history-entries { padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; max-height: 420px; }
  .history-entry { padding: 11px 13px; background: var(--paper-2); border-radius: 10px; border: 1px solid transparent; cursor: pointer; }
  .history-entry:hover { border-color: var(--paper-3); }
  .has-note { font-size: 11px; color: var(--ink-3); margin-top: 4px; font-style: italic; font-family: Arial, sans-serif; }
  .detail-body { padding: 18px 20px; flex: 1; overflow-y: auto; }
  .detail-cat { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-3); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; font-family: Arial, sans-serif; }
  .detail-text { font-family: Georgia, serif; font-size: 15px; line-height: 1.7; color: var(--ink); margin-bottom: 10px; }
  .detail-date { font-size: 11px; color: var(--ink-3); margin-bottom: 16px; font-family: Arial, sans-serif; }
  .reflection-box { border-radius: 10px; padding: 13px; margin-bottom: 13px; }
  .reflection-box.win-box { background: var(--win-soft); }
  .reflection-box.ref-box { background: var(--accent-soft); }
  .reflection-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; font-weight: bold; font-family: Arial, sans-serif; }
  .win-box .reflection-label { color: var(--win); }
  .ref-box .reflection-label { color: var(--accent); }
  .reflection-prompt { font-size: 12.5px; color: var(--ink-2); line-height: 1.6; font-style: italic; font-family: Georgia, serif; }
  .note-area { margin-top: 13px; }
  .note-area textarea { width: 100%; min-height: 72px; background: var(--paper-2); border: 1px solid var(--paper-3); border-radius: 8px; padding: 9px 11px; font-family: Arial, sans-serif; font-size: 12.5px; color: var(--ink); resize: none; outline: none; line-height: 1.5; }
  .note-area textarea:focus { border-color: var(--ink-3); }
  .note-area textarea::placeholder { color: var(--ink-3); }
  .note-save-btn { margin-top: 7px; padding: 5px 14px; background: var(--ink); color: var(--paper); border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: Arial, sans-serif; }
  .note-save-btn:hover { opacity: 0.8; }
  .delete-btn { width: 100%; margin-top: 12px; padding: 7px; background: transparent; color: #c0392b; border: 1px solid #f0c8c3; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: Arial, sans-serif; }
  .delete-btn:hover { background: #fdf0ee; }
  .todo-input-row { padding: 14px 20px; display: flex; gap: 8px; border-bottom: 1px solid var(--paper-3); }
  .todo-input { flex: 1; padding: 7px 11px; background: var(--paper-2); border: 1px solid var(--paper-3); border-radius: 8px; font-family: Arial, sans-serif; font-size: 13px; color: var(--ink); outline: none; }
  .todo-input:focus { border-color: var(--ink-3); }
  .todo-input::placeholder { color: var(--ink-3); }
  .todo-add-btn { padding: 7px 14px; background: var(--ink); color: var(--paper); border: none; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; font-family: Arial, sans-serif; }
  .todo-add-btn:hover { opacity: 0.8; }
  .todo-list { padding: 12px 20px; display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; }
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--paper-2); border-radius: 8px; transition: all 0.2s; }
  .todo-item.done { opacity: 0.45; }
  .todo-check { width: 18px; height: 18px; min-width: 18px; border-radius: 50%; border: 1.5px solid var(--paper-3); background: var(--paper); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .todo-check:hover { border-color: var(--win); }
  .todo-item.done .todo-check { background: var(--win); border-color: var(--win); }
  .todo-label { flex: 1; font-family: Arial, sans-serif; font-size: 13px; color: var(--ink); line-height: 1.4; cursor: pointer; }
  .todo-item.done .todo-label { text-decoration: line-through; color: var(--ink-3); }
  .todo-del { width: 22px; height: 22px; border: none; background: transparent; cursor: pointer; color: var(--paper-3); font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; flex-shrink: 0; }
  .todo-del:hover { color: #c0392b; background: #fdf0ee; }
  .todo-tabs { display: flex; padding: 10px 20px 0; gap: 4px; }
  .todo-tab { padding: 4px 12px; border-radius: 20px; font-size: 11px; border: 1px solid transparent; background: transparent; color: var(--ink-3); cursor: pointer; font-family: Arial, sans-serif; }
  .todo-tab.active { background: var(--ink); color: var(--paper); }
  .todo-done-count { padding: 8px 20px 0; font-size: 11px; color: var(--win); font-family: Arial, sans-serif; font-weight: bold; }
  .todo-empty { padding: 20px; text-align: center; color: var(--ink-3); font-size: 12px; font-style: italic; }
  .toast { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%) translateY(30px); background: var(--ink); color: var(--paper); padding: 6px 16px; border-radius: 20px; font-size: 12px; opacity: 0; transition: all 0.22s; pointer-events: none; white-space: nowrap; z-index: 100; font-family: Arial, sans-serif; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--paper-3); border-radius: 2px; }
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round">
          <path d="M2 9L6 3L10 9"/><path d="M3.5 7h5"/>
        </svg>
      </div>
      <span class="app-name">Growth Log</span>
    </div>
    <span class="header-date" id="header-date"></span>
  </div>
  <div class="greeting" id="greeting-text"></div>
  <div class="daily-prompt" id="daily-prompt"></div>
  <div class="categories" id="cat-pills"></div>
  <div class="composer">
    <textarea id="entry-input" placeholder="Something you're proud of, something that didn't go as planned, a moment you noticed yourself growing..."></textarea>
    <div class="composer-footer">
      <div class="type-toggle">
        <button class="type-btn win active" id="btn-win">Win</button>
        <button class="type-btn ref" id="btn-ref">Reflection</button>
      </div>
      <button class="save-btn" id="btn-save">Log it</button>
    </div>
  </div>
  <div class="section-header">
    <span>Recent</span>
    <button class="see-all-btn" id="btn-see-all">See all →</button>
  </div>
  <div class="entries-list" id="recent-list"></div>
  <div class="stats-strip" id="stats-strip"></div>
  <nav class="nav">
    <button class="nav-btn active" id="nav-log">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M3 4h10M3 8h7M3 12h5"/></svg>
      Log
    </button>
    <button class="nav-btn" id="nav-todo">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="3" y="3" width="10" height="10" rx="2"/><path d="M6 8l1.5 1.5L10 6.5"/></svg>
      To-do
    </button>
  </nav>
</div>

<!-- HISTORY -->
<div id="screen-history" class="screen">
  <div class="subheader">
    <button class="back-btn" id="btn-history-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg>
    </button>
    <span class="screen-title">All entries</span>
  </div>
  <div class="filter-row" id="filter-row"></div>
  <div class="history-entries" id="history-list"></div>
</div>

<!-- DETAIL -->
<div id="screen-detail" class="screen">
  <div class="subheader">
    <button class="back-btn" id="btn-detail-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg>
    </button>
    <span class="screen-title">Entry</span>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- TODO -->
<div id="screen-todo" class="screen">
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round">
          <path d="M2 9L6 3L10 9"/><path d="M3.5 7h5"/>
        </svg>
      </div>
      <span class="app-name">To-do</span>
    </div>
  </div>
  <div class="todo-input-row">
    <input class="todo-input" id="todo-input" type="text" placeholder="Add something to do...">
    <button class="todo-add-btn" id="todo-add-btn">Add</button>
  </div>
  <div class="todo-tabs">
    <button class="todo-tab active" id="tab-open">Open</button>
    <button class="todo-tab" id="tab-done">Done</button>
  </div>
  <div class="todo-done-count" id="todo-done-count" style="display:none"></div>
  <div class="todo-list" id="todo-list"></div>
  <nav class="nav">
    <button class="nav-btn" id="nav-log-2">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M3 4h10M3 8h7M3 12h5"/></svg>
      Log
    </button>
    <button class="nav-btn active" id="nav-todo-2">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="3" y="3" width="10" height="10" rx="2"/><path d="M6 8l1.5 1.5L10 6.5"/></svg>
      To-do
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
